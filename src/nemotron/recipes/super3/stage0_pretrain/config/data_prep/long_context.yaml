run:
  env:
    container: anyscale/ray:2.49.2-py312

# Long-Context Phase data preparation
# 80% Phase 2 data + 20% long-context document QA (319K rows).
# Used for both LC Stage 1 (1M context, 34B tokens) and Stage 2 (alternating 1M/4K, 17B tokens).
#
# Usage:
#   nemotron super3 data prep pretrain --config long_context

# Path to data blend JSON file
blend_path: ${oc.env:PWD}/src/nemotron/recipes/super3/stage0_pretrain/config/data_prep/data_blend_raw_long_context.json

# Output directory for tokenized data
output_dir: /lustre/fsw/portfolios/coreai/users/mromeijn/output/super3/stage0_pretrain/long_context

# Number of output shards for parallel loading
num_shards: 128

# Number of shards for validation split
valid_shards: 1

# Number of shards for test split
test_shards: 1

# Tokenizer configuration (nested)
tokenizer:
  model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
  add_bos: false
  add_eos: true

# Default text field name in datasets
text_field: text

# Skip documents shorter than this (null = no limit)
min_doc_chars: null

# Truncate documents longer than this (null = no limit)
max_doc_tokens: null

# Limit rows per dataset for quick tests (null = no limit)
sample: null

# Force new run, ignoring cache
force: false

# Config name for artifact naming
config_name: long_context

# =============================================================================
# Stage Configs
# =============================================================================

plan:
  planner_cpus: 0.5

download:
  batch_size: 1
  stage_cpus: 0.5
  hf_xet_high_performance: true
  hf_xet_concurrent_range_gets: 32
  max_retries: 3
  timeout_sec: 300

tokenization:
  cpus_per_worker: 4

# =============================================================================
# Pipeline Config
# =============================================================================

observability:
  pipeline_logging_interval_s: 30
  wandb_log_pipeline_stats: true
