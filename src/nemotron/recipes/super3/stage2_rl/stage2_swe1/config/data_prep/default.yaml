# SWE Stage 1 data preparation
#
# Splits swe1.jsonl into train/val (last 100 rows → val).
# No placeholder resolution needed.
#
# Usage:
#   nemotron super3 data prep rl swe1
#   nemotron super3 data prep rl swe1 sample=1000

# Path to source JSONL file
# TODO: Update to hf:// path once nvidia/Nemotron-RL-Super-Training-Blends is published
input_path: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemorl/users/yifuw/code/nano-v3-data/super_data/release/swe1.jsonl

# Output directory
output_dir: ${oc.env:PWD}/../output/super3/stage2_rl/swe1

# Number of rows to hold out for validation (from end of file)
val_holdout: 100

# Limit rows per dataset for quick tests (null = no limit)
sample: null

# Force new run, ignoring cache
force: false
