run:
  data: super3/rl/rlhf/data:latest
  model: super3-sft-model:latest
  env:
    container: nvcr.io/nvidia/nemo-rl:v0.5.0.nemotron_3_super

defaults: "default.yaml"

checkpointing:
  enabled: true
  checkpoint_dir: "results/super_v3_prod_stage3_24node"

grpo:
  num_prompts_per_step: 128
  num_generations_per_prompt: 8

policy:
  train_global_batch_size: 1024
  generation:
    colocated:
      resources:
        num_nodes: 8
    vllm_cfg:
      tensor_parallel_size: 8
    vllm_kwargs:
      max_num_seqs: 16
  megatron_cfg:
    expert_model_parallel_size: 16

cluster:
  num_nodes: 24
